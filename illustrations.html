<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>illustration | Bridget Knight</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="assets/favicon.png">
    <script src="scripts/theme.js" defer></script>
    <script src="scripts/cursor_trail.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body data-theme="light">
    <div id="center">
        <header>
            <div id="navbar"></div>
            <script>
                fetch("/navbar.html")
                .then(response => response.text())
                .then(html => {
                    document.getElementById("navbar").innerHTML = html;

                    const link = document.querySelector('#name a');
                    if (!link) {
                        console.log("Name link not found");
                        return;
                    }

                    link.addEventListener('mouseenter', () => {
                        link.classList.add('scatter-active');
                        const letters = link.querySelectorAll('.name-letter');
                        letters.forEach((letter, index) => {
                            setTimeout(() => {
                                // Gentle wave pattern - alternates up and down
                                const yOffset = (index % 2 === 0 ? -8 : 8);
                                const xOffset = (index - (letters.length / 2)) * 3; // Spreads them out gradually
                                const rotation = (index % 2 === 0 ? -5 : 5); // Slight tilt
                                letter.style.transform = `translateX(${xOffset}px) translateY(${yOffset}px) rotate(${rotation}deg)`;
                            }, index * 30);
                        });
                    });

                    link.addEventListener('mouseleave', () => {
                        link.classList.remove('scatter-active');
                        const letters = link.querySelectorAll('.name-letter');
                        letters.forEach((letter, index) => {
                            setTimeout(() => {
                                letter.style.transform = '';
                            }, index * 50); // Add the same stagger delay
                        });
                    });
                    
                    const text = link.textContent.trim();
                    link.textContent = '';
                    
                    text.split('').forEach((char, i) => {
                        const span = document.createElement('span');
                        span.textContent = char === ' ' ? '\u00A0' : char;
                        span.className = 'name-letter';
                        span.style.animationDelay = `${i * 0.08}s`;
                        link.appendChild(span);
                    });
                });
            </script>
        </header>

        <div id="main_section">
            <div class="portfolio_header">
                <h1>Illustration</h1>
            </div>

            <div class="masonry_gallery" id="design_gallery"></div>

            <script>
                let galleryItems = [];

                fetch('/scripts/artwork_directory.json')
                .then(res => res.json())
                .then(data => {
                    galleryItems = data.illustrations.map(item => ({
                        ...item,
                        folder: 'illustrations'
                    }));

                    const gallery = document.getElementById('design_gallery');
                    
                    galleryItems.forEach((item, index) => {
                        const fig = document.createElement('figure');
                        fig.className = 'gallery_item';
                        fig.innerHTML = `
                            <img src="/assets/${item.folder}/${item.file}" alt="${item.title}" loading="lazy">
                            <figcaption>
                                <span>${item.title}</span>
                                <span>${item.year}</span>
                            </figcaption>
                        `;
                        gallery.appendChild(fig);
                        fig.addEventListener('click', () => openLightbox(index));
                    });
                });

                function openLightbox(index) {
                    const overlay = document.createElement('div');
                    overlay.className = 'gallery_lightbox_overlay active';
                    overlay.innerHTML = `
                        <span class="gallery_lightbox_arrow left">&#8592;</span>
                        <div class="gallery_lightbox_container">
                            <span class="gallery_lightbox_close">&times;</span>
                            <img src="" alt="">
                            <figcaption></figcaption>
                        </div>
                        <span class="gallery_lightbox_arrow right">&#8594;</span>
                    `;
                    document.body.appendChild(overlay);

                    function loadImage(i) {
                        const item = galleryItems[i];
                        const img = overlay.querySelector('img');
                        const caption = overlay.querySelector('figcaption');

                        img.classList.add('fading');
                        setTimeout(() => {
                            img.src = `/assets/${item.folder}/${item.file}`;
                            img.alt = item.title;
                            caption.textContent = `${item.title} — ${item.year}`;
                            img.onload = () => img.classList.remove('fading');
                        }, 250);
                    }

                    loadImage(index);

                    overlay.querySelector('.gallery_lightbox_arrow.left').addEventListener('click', (e) => {
                        e.stopPropagation();
                        index = (index - 1 + galleryItems.length) % galleryItems.length;
                        loadImage(index);
                    });

                    overlay.querySelector('.gallery_lightbox_arrow.right').addEventListener('click', (e) => {
                        e.stopPropagation();
                        index = (index + 1) % galleryItems.length;
                        loadImage(index);
                    });

                    overlay.querySelector('.gallery_lightbox_close').addEventListener('click', () => overlay.remove());

                    overlay.addEventListener('click', (e) => {
                        if (!e.target.closest('.gallery_lightbox_container') && 
                            !e.target.closest('.gallery_lightbox_arrow')) {
                            overlay.remove();
                        }
                    });

                    function onKey(e) {
                        if (e.key === 'ArrowRight') {
                            index = (index + 1) % galleryItems.length;
                            loadImage(index);
                        } else if (e.key === 'ArrowLeft') {
                            index = (index - 1 + galleryItems.length) % galleryItems.length;
                            loadImage(index);
                        } else if (e.key === 'Escape') {
                            overlay.remove();
                            document.removeEventListener('keydown', onKey);
                        }
                    }
                    document.addEventListener('keydown', onKey);
                    overlay.addEventListener('click', (e) => {
                        if (!e.target.closest('.gallery_lightbox_container') &&
                            !e.target.closest('.gallery_lightbox_arrow')) {
                            document.removeEventListener('keydown', onKey);
                        }
                    });
                }
            </script>
        </div>

        <footer id="footer">
            <div class="footer_grid">
                <div class="footer_column footer_left">
                    <h3 id="footer_name">BRIDGET KNIGHT</h3>
                    <p class="footer_subtitle">Concept Artist & Creative Technologist</p>
                </div>
                <div class="footer_column footer_middle">
                    <a href="mailto:bridget.g.knight@gmail.com" class="footer_email">bridget.g.knight@gmail.com</a>
                </div>
                <div class="footer_column footer_right">
                    <p class="footer_social_label">say hi elsewhere:</p>
                    <div class="footer_socials">
                        <a href="https://linkedin.com/in/bridgetgknight" target="_blank" title="LinkedIn">
                            <i class="fab fa-linkedin"></i>
                        </a>
                        <a href="https://artstation.com/bridgetknight" target="_blank" title="ArtStation">
                            <i class="fab fa-artstation"></i>
                        </a>
                        <a href="https://instagram.com/pixelbrit" target="_blank" title="Instagram">
                            <i class="fab fa-instagram"></i>
                        </a>
                    </div>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
