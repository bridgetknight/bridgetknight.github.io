    <meta name="description" content="Boston-based concept artist with a computer science background creating visual development, environments, and characters for games and animation. Savannah College of Art and Design master's of art student. Bachelor's of science in computer science. Portfolio of Bridget Knight.">
    <meta name="keywords" content="Bridget Knight, concept artist, game concept art, environment concept art, character concept art, illustration portfolio, visual development, creative technologist, technical artist, computational art, generative art, game art portfolio, digital painting, worldbuilding art, Savannah College of Art and Design, SCAD, master's of art, MA, Boston artist, Boston concept artist, art and technology, creative coding, interactive art, digital art portfolio, art and design, visual storytelling, art for games, art for animation, art and programming, art and computer science, art and technology portfolio">
    <title>Bridget Knight | Concept Artist & Creative Technologist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel='stylesheet' href='//cdn.jsdelivr.net/npm/hack-font@3.3.0/build/web/hack-subset.css'>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Momo+Trust+Display&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Stack+Sans+Notch:wght@200..700&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="assets/splash_image_overlay_only.webp">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="assets/favicon.png">
    <script src="scripts/theme.js" defer></script>
</head>

<body data-theme="light">
    <!-- Google Tag Manager (noscript) -->
    <noscript>
        <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5BBVCFR6"
        height="0" width="0" style="display:none;visibility:hidden"></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <svg style="display:none" aria-hidden="true">
        <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.65"       numOctaves="3" stitchTiles="stitch"/>
            <feColorMatrix type="saturate" values="0"/>
        </filter>
    </svg>
    <div id="center">
        <header>
            <div id="navbar"></div>
            <script>
                fetch("/navbar.html")
                .then(response => response.text())
                .then(html => document.getElementById("navbar").innerHTML = html);
            </script>
        </header>

        <div id="main_section">
            <div id="splash_container">
                <img id="splash_image" src="assets/splash_image_overlay_only.webp" alt="Concept art of a farmer and a creature in a field after a hard day's work">
                <div id="splash_overlay">
                    <div id="splash_text">
                        <a href="mailto:bridget.g.knight@gmail.com">bridget.g.knight@gmail.com</a>
                        <ul>
                            <li>concept art</li>
                            <li>visual development</li>
                            <li>technical design</li>
                        </ul>
                    </div>
                </div>
            </div>
            <div id="main_gallery" class="gallery_grid"></div>
            <script>
                let current_gallery = "main_gallery";
                let galleryItems = []; // store all items globally once loaded

                fetch('/scripts/artwork_directory.json')
                .then(res => res.json())
                .then(data => {
                    const gallery = data[current_gallery];
                    galleryItems = gallery; // save for lightbox navigation
                    const container = document.getElementById(current_gallery);

                    gallery.forEach((item, index) => {
                        const fig = document.createElement('figure');
                        fig.className = 'gallery_item';
                        fig.innerHTML = `
                            <img src="/assets/main_gallery/${item.file}" alt="${item.title}" loading="lazy">
                            <figcaption>
                                <span>${item.title}</span>
                                <span>${item.year}</span>
                            </figcaption>
                        `;
                        container.appendChild(fig);
                        fig.addEventListener('click', () => openLightbox(index));
                    });
                });

                function openLightbox(index) {
                    const overlay = document.createElement('div');
                    overlay.className = 'gallery_lightbox_overlay active';
                    overlay.innerHTML = `
                        <span class="gallery_lightbox_arrow left">&#8592;</span>
                        <div class="gallery_lightbox_container">
                            <span class="gallery_lightbox_close">&times;</span>
                            <img src="" alt="">
                            <figcaption></figcaption>
                        </div>
                        <span class="gallery_lightbox_arrow right">&#8594;</span>
                    `;
                    document.body.appendChild(overlay);

                    function loadImage(i) {
                        const item = galleryItems[i];
                        const img = overlay.querySelector('img');
                        const caption = overlay.querySelector('figcaption');

                        img.classList.add('fading');
                        setTimeout(() => {
                            img.src = `/assets/main_gallery/${item.file}`;
                            img.alt = item.title;
                            caption.textContent = `${item.title} — ${item.year}`;
                            img.onload = () => img.classList.remove('fading');
                        }, 250);
                    }

                    loadImage(index);

                    overlay.querySelector('.gallery_lightbox_arrow.left').addEventListener('click', (e) => {
                        e.stopPropagation();
                        index = (index - 1 + galleryItems.length) % galleryItems.length;
                        loadImage(index);
                    });

                    overlay.querySelector('.gallery_lightbox_arrow.right').addEventListener('click', (e) => {
                        e.stopPropagation();
                        index = (index + 1) % galleryItems.length;
                        loadImage(index);
                    });

                    overlay.querySelector('.gallery_lightbox_close').addEventListener('click', () => overlay.remove());

                    overlay.addEventListener('click', (e) => {
                        if (!e.target.closest('.gallery_lightbox_container') && 
                            !e.target.closest('.gallery_lightbox_arrow')) {
                            overlay.remove();
                        }
                    });

                    // keyboard navigation
                    function onKey(e) {
                        if (e.key === 'ArrowRight') {
                            index = (index + 1) % galleryItems.length;
                            loadImage(index);
                        } else if (e.key === 'ArrowLeft') {
                            index = (index - 1 + galleryItems.length) % galleryItems.length;
                            loadImage(index);
                        } else if (e.key === 'Escape') {
                            overlay.remove();
                            document.removeEventListener('keydown', onKey);
                        }
                    }
                    document.addEventListener('keydown', onKey);
                    overlay.addEventListener('click', (e) => {
                        if (!e.target.closest('.gallery_lightbox_container') &&
                            !e.target.closest('.gallery_lightbox_arrow')) {
                            document.removeEventListener('keydown', onKey);
                        }
                    });
                }
            </script>
        </div>
    </div>
    <div id="theme-toggle">
        <input type="checkbox" class="mode_checkbox" id="mode_checkbox">
        <label for="mode_checkbox" class="mode_checkbox-label">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun"></i>
            <span class="ball"></span>
        </label>
    </div>

    </div>-->
</body>
</html>
